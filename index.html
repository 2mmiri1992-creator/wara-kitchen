var shopWhereFilter = 'all';

function renderShopFilterBar() {
  var bar = document.getElementById('shopFilterBar');
  if (!bar) return;
  var items = DB.shopping || [];
  // 구매처 목록 자동 추출 (중복 제거, 빈 값 제외)
  var places = [];
  items.forEach(function(item) {
    if (!item.where) return;
    // 여러 구매처가 "/" 로 구분된 경우 분리
    item.where.split('/').forEach(function(p) {
      var t = p.trim();
      if (t && !places.includes(t)) places.push(t);
    });
  });

  var html = '<button class="filter-btn' + (shopWhereFilter==='all'?' active':'') + '" onclick="setShopFilter(\'all\')">전체</button>';
  if (places.length) {
    html += '<div class="filter-divider"></div>';
    places.forEach(function(p) {
      var isActive = shopWhereFilter === p;
      html += '<button class="filter-btn' + (isActive?' active':'') + '" onclick="setShopFilter(\'' + p.replace(/'/g,"\\'") + '\')">' + p + '</button>';
    });
  }
  bar.innerHTML = html;
}

function setShopFilter(val) {
  shopWhereFilter = val;
  renderShopFilterBar();
  renderShopping();
}

function renderShopping() {
  renderShopFilterBar();
  var el = document.getElementById('shoppingContent');
  if (!el) return;
  var allItems = DB.shopping || [];

  // 구매처 필터 적용
  var items = shopWhereFilter === 'all' ? allItems : allItems.filter(function(item) {
    if (!item.where) return false;
    return item.where.split('/').some(function(p){ return p.trim() === shopWhereFilter; });
  });

  if (!allItems.length) {
    el.innerHTML = '<div class="empty"><h3>장보기 가이드가 없어요</h3><p>편집 모드에서 추가해보세요</p></div>';
    return;
  }
  if (!items.length) {
    el.innerHTML = '<div class="empty"><h3>' + shopWhereFilter + ' 항목이 없어요</h3></div>';
    return;
  }
  var groups = {}, order = [];
  items.forEach(function(item) {
    var cat = item.cat || '기타';
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push(item);
  });
  var html = '';
  order.forEach(function(cat) {
    groups[cat].forEach(function(item) {
      var imgHtml = item.img
        ? '<div class="shop-card-img"><img src="' + item.img + '"></div>'
        : '<div class="shop-card-img">📦</div>';
      var badges = '';
      if (item.where) badges += '<span class="shop-badge where">📍 ' + item.where + '</span>';
      if (item.alt)   badges += '<span class="shop-badge alt">🔄 ' + item.alt + '</span>';
      html += '<div class="shop-card">'
        + '<div class="shop-card-top">' + imgHtml
        + '<div class="shop-card-info">'
        + '<div class="shop-card-cat">' + (item.cat||'기타') + '</div>'
        + '<div class="shop-card-name">' + item.name + '</div>'
        + (item.brand ? '<div class="shop-card-brand">🏷 ' + item.brand + '</div>' : '')
        + (item.size  ? '<div class="shop-card-size">📏 ' + item.size + '</div>' : '')
        + '</div></div>'
        + ((badges || item.memo) ? '<div class="shop-card-body">'
          + (badges ? '<div class="shop-badge-row">' + badges + '</div>' : '')
          + (item.memo ? '<div class="shop-memo">📝 ' + item.memo + '</div>' : '')
          + '</div>' : '')
        + '<div class="shop-card-foot">'
        + '<button class="ie-btn" onclick="editShopItem(\'' + item.id + '\')">✏️</button>'
        + '<button class="ie-btn" onclick="deleteShopItem(\'' + item.id + '\')">🗑️</button>'
        + '</div></div>';
    });
  });
  el.innerHTML = html;
}

function renderFaq() {
  var el = document.getElementById('faqContent');
  if (!el) return;
  var items = DB.faq || [];
  if (!items.length) {
    el.innerHTML = '<div class="empty"><h3>자주하는 질문이 없어요</h3><p>편집 모드에서 추가해보세요</p></div>';
    return;
  }
  el.innerHTML = items.map(function(item) {
    return '<div class="faq-item">'
      + '<div class="faq-q" onclick="toggleFaq(this)">'
      + '<div class="faq-q-text">'
      + '<div class="faq-q-ko">Q. ' + item.qKo + '</div>'
      + (item.qEn ? '<div class="faq-q-en">Q. ' + item.qEn + '</div>' : '')
      + '</div>'
      + '<div class="faq-edit-btns" onclick="event.stopPropagation()">'
      + '<button class="ie-btn" onclick="editFaqItem(\'' + item.id + '\')">✏️</button>'
      + '<button class="ie-btn" onclick="deleteFaqItem(\'' + item.id + '\')">🗑️</button>'
      + '</div>'
      + '<div class="faq-arrow">⌄</div>'
      + '</div>'
      + '<div class="faq-a">'
      + '<div class="faq-a-ko">' + item.aKo + '</div>'
      + (item.aEn ? '<div class="faq-a-en">' + item.aEn + '</div>' : '')
      + '</div></div>';
  }).join('');
}

// Shopping CRUD
var editingShopId = null, currentShopImg = '';

function handleShopImg(e) {
  var f = e.target.files[0]; if (!f) return;
  var rd = new FileReader();
  rd.onload = function(ev) {
    currentShopImg = ev.target.result;
    document.getElementById('shopImgPv').src = currentShopImg;
    document.getElementById('shopImgPv').style.display = 'block';
    document.getElementById('shopImgPh').style.display = 'none';
  };
  rd.readAsDataURL(f);
}

function openShoppingAdd() {
  if (!editMode) { showToast('편집 모드를 켜주세요'); return; }
  editingShopId = null; currentShopImg = '';
  document.getElementById('shopModalTitle').textContent = '🛒 장보기 항목 추가';
  ['shopCat','shopName','shopBrand','shopSize','shopWhere','shopAlt','shopMemo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('shopImgPv').style.display = 'none';
  document.getElementById('shopImgPh').style.display = 'block';
  document.getElementById('shopImgFile').value = '';
  document.getElementById('shoppingModal').classList.add('open');
}

function editShopItem(id) {
  var item = (DB.shopping||[]).find(function(i){return i.id===id;});
  if (!item) return;
  editingShopId = id; currentShopImg = item.img || '';
  document.getElementById('shopModalTitle').textContent = '🛒 장보기 항목 수정';
  document.getElementById('shopCat').value   = item.cat   || '';
  document.getElementById('shopName').value  = item.name  || '';
  document.getElementById('shopBrand').value = item.brand || '';
  document.getElementById('shopSize').value  = item.size  || '';
  document.getElementById('shopWhere').value = item.where || '';
  document.getElementById('shopAlt').value   = item.alt   || '';
  document.getElementById('shopMemo').value  = item.memo  || '';
  if (item.img) { document.getElementById('shopImgPv').src=item.img; document.getElementById('shopImgPv').style.display='block'; document.getElementById('shopImgPh').style.display='none'; }
  else { document.getElementById('shopImgPv').style.display='none'; document.getElementById('shopImgPh').style.display='block'; }
  document.getElementById('shoppingModal').classList.add('open');
}

function closeShoppingModal() { document.getElementById('shoppingModal').classList.remove('open'); editingShopId=null; }

async function saveShoppingItem() {
  var name = document.getElementById('shopName').value.trim();
  if (!name) { alert('재료명을 입력하세요'); return; }
  var item = { id: editingShopId||('shop_'+Date.now()), cat: document.getElementById('shopCat').value.trim(), name: name, brand: document.getElementById('shopBrand').value.trim(), size: document.getElementById('shopSize').value.trim(), where: document.getElementById('shopWhere').value.trim(), alt: document.getElementById('shopAlt').value.trim(), memo: document.getElementById('shopMemo').value.trim(), img: currentShopImg };
  if (!DB.shopping) DB.shopping = [];
  if (editingShopId) { var idx=DB.shopping.findIndex(function(i){return i.id===editingShopId;}); if(idx!==-1) DB.shopping[idx]=item; }
  else DB.shopping.push(item);
  await saveDB(); closeShoppingModal(); renderShopping();
}

async function deleteShopItem(id) { DB.shopping=(DB.shopping||[]).filter(function(i){return i.id!==id;}); await saveDB(); renderShopping(); }

async function saveFaqItem() {
  var qKo = document.getElementById('faqQ').value.trim();
  if (!qKo) { alert('질문(한국어)을 입력하세요'); return; }
  var item = { id: editingFaqId||('faq_'+Date.now()), qKo: qKo, qEn: '', aKo: document.getElementById('faqA').value.trim(), aEn: '' };
  if (!DB.faq) DB.faq = [];
  if (editingFaqId) { var idx=DB.faq.findIndex(function(i){return i.id===editingFaqId;}); if(idx!==-1) DB.faq[idx]=item; }
  else DB.faq.push(item);
  await saveDB(); closeFaqModal(); renderFaq();
}

function editFaqItem(id) {
  var item = (DB.faq||[]).find(function(i){return i.id===id;});
  if (!item) return;
  editingFaqId = id;
  document.getElementById('faqModalTitle').textContent = '❓ 질문 수정';
  document.getElementById('faqQ').value   = item.qKo||'';
  document.getElementById('faqA').value   = item.aKo||'';
  document.getElementById('faqModal').classList.add('open');
}

async function deleteFaqItem(id) { DB.faq=(DB.faq||[]).filter(function(i){return i.id!==id;}); await saveDB(); renderFaq(); }

// ═══════════════ MEMO ═══════════════
// DB.memo = { front: [{id, title, items:[{id,time,text,checked}]}], back:[...], hall:[...] }

var editingMemoZone = null, editingMemoId = null;
var currentMemoType = 'normal';

function setMemoType(type) {
  currentMemoType = type;
  document.getElementById('memoNormalSection').style.display = type === 'normal' ? 'block' : 'none';
  document.getElementById('memoTableSection').style.display  = type === 'table'  ? 'block' : 'none';
  document.getElementById('memoTypeNormal').classList.toggle('active', type === 'normal');
  document.getElementById('memoTypeTable').classList.toggle('active', type === 'table');
}

function addMemoCol() {
  var el = document.getElementById('memoColList');
  var row = document.createElement('div'); row.className = 'list-row';
  row.innerHTML = '<span class="row-handle">⠿</span>'
    + '<input type="text" placeholder="예) 1차, 2차(월-목)" style="flex:1">'
    + '<button class="rm-btn" onclick="this.parentElement.remove()">×</button>';
  el.appendChild(row); initRowDrag(row);
}

function addMemoRow() {
  var el = document.getElementById('memoRowList');
  var row = document.createElement('div'); row.className = 'list-row';
  row.innerHTML = '<span class="row-handle">⠿</span>'
    + '<input type="text" placeholder="예) 오이, 살몬, 튜나" style="flex:1">'
    + '<button class="rm-btn" onclick="this.parentElement.remove()">×</button>';
  el.appendChild(row); initRowDrag(row);
}

function renderMemo(zone) {
  var el = document.getElementById('memo-' + zone);
  if (!el) return;
  var addRow = document.getElementById('memoAddRow-' + zone);
  if (addRow) addRow.style.display = editMode ? 'block' : 'none';
  var memos = (DB.memo && DB.memo[zone]) || [];
  if (!memos.length) {
    el.innerHTML = '<div class="empty"><h3>메모가 없어요</h3><p>편집 모드에서 추가해보세요</p></div>';
    return;
  }
  el.innerHTML = memos.map(function(memo) {
    var icon = memo.type === 'table' ? '📊' : '📋';
    var head = '<div class="memo-card-head">'
      + '<div class="memo-card-title">' + icon + ' ' + memo.title + '</div>'
      + '<div class="memo-card-btns">'
      + '<button class="ie-btn" onclick="openMemoEdit(\'' + zone + '\',\'' + memo.id + '\')">✏️</button>'
      + '<button class="ie-btn" onclick="deleteMemo(\'' + zone + '\',\'' + memo.id + '\')">🗑️</button>'
      + '</div></div>';

    if (memo.type === 'table') {
      // 표 렌더링
      var cols = memo.cols || [];
      var rows = memo.rows || [];
      var tableData = memo.tableData || {};
      var thead = '<tr><th>' + (memo.rowHeader || '항목') + '</th>'
        + cols.map(function(c){ return '<th>' + c + '</th>'; }).join('') + '</tr>';
      var tbody = rows.map(function(r) {
        return '<tr><td>' + r + '</td>'
          + cols.map(function(c) {
              var val = (tableData[r] && tableData[r][c] !== undefined) ? tableData[r][c] : '';
              return '<td contenteditable="true" onblur="updateTableCell(\'' + zone + '\',\'' + memo.id + '\',\'' + r.replace(/'/g,"\\'") + '\',\'' + c.replace(/'/g,"\\'") + '\',this.innerText)">' + val + '</td>';
            }).join('') + '</tr>';
      }).join('');
      return '<div class="memo-card">' + head
        + '<div class="memo-table-wrap"><table class="memo-table"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table></div>'
        + '</div>';
    }

    // 일반 타입
    var items = (memo.items||[]).map(function(item) {
      if (item.type === 'long') {
        return '<div class="memo-item memo-long-item">'
          + '<div class="memo-long-text' + (item.checked ? ' checked' : '') + '">' + item.text.replace(/\n/g,'<br>') + '</div>'
          + '</div>';
      }
      return '<div class="memo-item">'
        + '<input type="checkbox" class="memo-check" ' + (item.checked ? 'checked' : '') + ' onchange="toggleMemoCheck(\'' + zone + '\',\'' + memo.id + '\',\'' + item.id + '\',this.checked)">'
        + (item.time ? '<span class="memo-time">' + item.time + '</span>' : '<span class="memo-time" style="color:var(--sub2)">—</span>')
        + '<span class="memo-text' + (item.checked ? ' checked' : '') + '">' + item.text + '</span>'
        + '</div>';
    }).join('');
    return '<div class="memo-card">' + head + items + '</div>';
  }).join('');
}

async function updateTableCell(zone, memoId, row, col, val) {
  if (!DB.memo || !DB.memo[zone]) return;
  var memo = DB.memo[zone].find(function(m){ return m.id === memoId; });
  if (!memo) return;
  if (!memo.tableData) memo.tableData = {};
  if (!memo.tableData[row]) memo.tableData[row] = {};
  memo.tableData[row][col] = val.trim();
  await saveDB();
}

async function toggleMemoCheck(zone, memoId, itemId, checked) {
  if (!DB.memo || !DB.memo[zone]) return;
  var memo = DB.memo[zone].find(function(m){ return m.id === memoId; });
  if (!memo) return;
  var item = (memo.items||[]).find(function(i){ return i.id === itemId; });
  if (item) item.checked = checked;
  await saveDB();
  renderMemo(zone);
}

function openMemoAdd(zone) {
  if (!editMode) { showToast('편집 모드를 켜주세요'); return; }
  editingMemoZone = zone; editingMemoId = null;
  document.getElementById('memoModalTitle').textContent = '📋 메모 추가';
  document.getElementById('memoTitle').value = '';
  document.getElementById('memoItemList').innerHTML = '';
  document.getElementById('memoColList').innerHTML = '';
  document.getElementById('memoRowList').innerHTML = '';
  document.getElementById('memoRowHeader').value = '';
  setMemoType('normal');
  addMemoItem();
  document.getElementById('memoModal').classList.add('open');
  setTimeout(function(){ document.getElementById('memoTitle').focus(); }, 100);
}

function openMemoEdit(zone, id) {
  var memo = ((DB.memo && DB.memo[zone]) || []).find(function(m){ return m.id === id; });
  if (!memo) return;
  editingMemoZone = zone; editingMemoId = id;
  document.getElementById('memoModalTitle').textContent = '📋 메모 수정';
  document.getElementById('memoTitle').value = memo.title || '';
  document.getElementById('memoItemList').innerHTML = '';
  document.getElementById('memoColList').innerHTML = '';
  document.getElementById('memoRowList').innerHTML = '';

  if (memo.type === 'table') {
    setMemoType('table');
    document.getElementById('memoRowHeader').value = memo.rowHeader || '';
    (memo.cols||[]).forEach(function(c){ addMemoCol(); var rows = document.querySelectorAll('#memoColList .list-row'); rows[rows.length-1].querySelector('input').value = c; });
    (memo.rows||[]).forEach(function(r){ addMemoRow(); var rows = document.querySelectorAll('#memoRowList .list-row'); rows[rows.length-1].querySelector('input').value = r; });
  } else {
    setMemoType('normal');
    (memo.items||[]).forEach(function(item){ addMemoItemRow(item.time||'', item.text||'', item.type||'line'); });
    if (!memo.items || !memo.items.length) addMemoItem();
  }
  document.getElementById('memoModal').classList.add('open');
}

function closeMemoModal() {
  document.getElementById('memoModal').classList.remove('open');
  editingMemoZone = null; editingMemoId = null;
}

function addMemoItem() { addMemoItemRow('', '', 'line'); }
function addMemoLongItem() { addMemoItemRow('', '', 'long'); }

function addMemoItemRow(time, text, type) {
  var el = document.getElementById('memoItemList');
  var row = document.createElement('div');
  row.className = 'list-row memo-row';
  row.dataset.type = type || 'line';
  if (type === 'long') {
    row.innerHTML = '<textarea class="text-input long-memo-input" placeholder="여기에 길게 내용을 적어주세요..." rows="4" style="flex:1;resize:vertical;font-family:\'Noto Sans KR\',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;outline:none;">' + text + '</textarea>'
      + '<button class="rm-btn" onclick="this.parentElement.remove()" style="align-self:flex-start;margin-top:4px;">×</button>';
  } else {
    row.innerHTML = '<input type="text" class="time-input" placeholder="9:00-9:20" value="' + time + '">'
      + '<input type="text" class="text-input" placeholder="예) 아보카도 까기" value="' + text + '">'
      + '<button class="rm-btn" onclick="this.parentElement.remove()">×</button>';
  }
  el.appendChild(row);
}

async function saveMemo() {
  var title = document.getElementById('memoTitle').value.trim();
  if (!title) { alert('제목을 입력하세요'); return; }

  // 개인 메모 처리
  if (editingMemoZone === '__personal__') {
    var savedMemo;
    if (currentMemoType === 'table') {
      var cols = Array.from(document.querySelectorAll('#memoColList .list-row')).map(function(r){ return r.querySelector('input').value.trim(); }).filter(Boolean);
      var rows = Array.from(document.querySelectorAll('#memoRowList .list-row')).map(function(r){ return r.querySelector('input').value.trim(); }).filter(Boolean);
      if (!cols.length || !rows.length) { alert('열과 행을 최소 1개씩 입력하세요'); return; }
      var existingData = {};
      if (myMemoEditIdx >= 0) {
        var old = getMyMemos()[myMemoEditIdx];
        if (old) existingData = old.tableData || {};
      }
      savedMemo = { id: 'mm_'+Date.now(), type:'table', title, cols, rows, tableData: existingData };
    } else {
      var items = Array.from(document.querySelectorAll('#memoItemList .memo-row')).map(function(row) {
        var type = row.dataset.type || 'line';
        if (type === 'long') { var ta = row.querySelector('textarea'); return { id:'mi_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), type:'long', time:'', text:ta?ta.value.trim():'', checked:false }; }
        var inputs = row.querySelectorAll('input[type=text]');
        return { id:'mi_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), type:'line', time:inputs[0]?inputs[0].value.trim():'', text:inputs[1]?inputs[1].value.trim():'', checked:false };
      }).filter(function(i){ return i.text; });
      savedMemo = { id: 'mm_'+Date.now(), type:'normal', title, items };
    }
    var memos = getMyMemos();
    if (myMemoEditIdx >= 0) memos[myMemoEditIdx] = savedMemo;
    else memos.push(savedMemo);
    saveMyMemos(memos);
    closeMemoModal();
    renderMyMemo();
    return;
  }

  if (!DB.memo) DB.memo = {};
  if (!DB.memo[editingMemoZone]) DB.memo[editingMemoZone] = [];

  var savedMemo;

  if (currentMemoType === 'table') {
    var cols = Array.from(document.querySelectorAll('#memoColList .list-row')).map(function(r){ return r.querySelector('input').value.trim(); }).filter(Boolean);
    var rows = Array.from(document.querySelectorAll('#memoRowList .list-row')).map(function(r){ return r.querySelector('input').value.trim(); }).filter(Boolean);
    if (!cols.length || !rows.length) { alert('열과 행을 최소 1개씩 입력하세요'); return; }
    // 기존 tableData 유지 (수정 시)
    var existingData = {};
    if (editingMemoId) {
      var old = DB.memo[editingMemoZone].find(function(m){ return m.id === editingMemoId; });
      if (old) existingData = old.tableData || {};
    }
    var rowHeader = document.getElementById('memoRowHeader').value.trim() || '항목';
    savedMemo = { id: editingMemoId || ('memo_'+Date.now()), type: 'table', title: title, rowHeader: rowHeader, cols: cols, rows: rows, tableData: existingData };
  } else {
    var items = Array.from(document.querySelectorAll('#memoItemList .memo-row')).map(function(row) {
      var type = row.dataset.type || 'line';
      if (type === 'long') {
        var ta = row.querySelector('textarea');
        return { id: 'mi_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), type:'long', time:'', text: ta ? ta.value.trim() : '', checked:false };
      }
      var inputs = row.querySelectorAll('input[type=text]');
      return { id: 'mi_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), type:'line', time: inputs[0]?inputs[0].value.trim():'', text: inputs[1]?inputs[1].value.trim():'', checked:false };
    }).filter(function(i){ return i.text; });
    savedMemo = { id: editingMemoId || ('memo_'+Date.now()), type: 'normal', title: title, items: items };
  }

  if (editingMemoId) {
    var idx = DB.memo[editingMemoZone].findIndex(function(m){ return m.id === editingMemoId; });
    if (idx !== -1) DB.memo[editingMemoZone][idx] = savedMemo;
  } else {
    DB.memo[editingMemoZone].push(savedMemo);
  }
  await saveDB();
  closeMemoModal();
  renderMemo(editingMemoZone);
}

async function deleteMemo(zone, id) {
  if (!DB.memo || !DB.memo[zone]) return;
  DB.memo[zone] = DB.memo[zone].filter(function(m){ return m.id !== id; });
  await saveDB();
  renderMemo(zone);
}

function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;font-family:"Noto Sans KR",sans-serif;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}
