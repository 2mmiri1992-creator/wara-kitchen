<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wara Sushi Kitchen Guide</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wara Kitchen">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C8102E; --black:#111; --bg:#F7F7F7; --white:#fff;
  --border:#EBEBEB; --text:#1A1A1A; --sub:#888; --sub2:#BDBDBD;
  --blue:#4A90D9; --green:#3DA86A; --red2:#D94A4A;
  --purple:#8B5CF6; --orange:#E87B1E; --blk:#2d2d2d; --yellow:#C9A800;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;max-width:640px;margin:0 auto;}

/* TOPBAR */
.topbar{background:var(--white);position:sticky;top:0;z-index:300;border-bottom:1px solid var(--border);}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.store-name{font-size:16px;font-weight:700;}
.topbar-btns{display:flex;align-items:center;gap:8px;}
.print-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--sub);cursor:pointer;}
.edit-toggle{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--sub);cursor:pointer;}
.edit-toggle.active{background:var(--red);border-color:var(--red);color:white;}
.edit-banner{display:none;background:var(--red);color:white;text-align:center;padding:5px;font-size:11px;font-weight:600;}
body.edit-mode .edit-banner{display:block;}

/* KITCHEN TABS */
.kitchen-tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;}
.k-tab{flex:1;padding:10px 0;font-size:13px;font-weight:600;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.k-tab.active{color:var(--text);border-bottom-color:var(--red);}

/* SECTION TABS */
.sec-nav{background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:85px;z-index:90;}
.sec-nav::-webkit-scrollbar{display:none;}
.sec-nav-inner{display:flex;padding:0 12px;min-width:max-content;}
.s-tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.s-tab.active{color:var(--text);font-weight:700;border-bottom-color:var(--red);}
body.edit-mode .sec-nav{top:111px;}

/* SEARCH */
.search-wrap{padding:10px 14px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:85px;z-index:89;display:none;}
body.edit-mode .search-wrap{top:111px;}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:12px;padding:9px 14px;}
.search-input{border:none;background:none;outline:none;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);width:100%;}
.search-input::placeholder{color:var(--sub2);}
.search-clear{background:none;border:none;font-size:18px;color:var(--sub2);cursor:pointer;display:none;}

/* PANELS */
.main{padding-bottom:40px;}
.k-panel{display:none;}
.k-panel.visible{display:block;}
.s-panel{display:none;}
.s-panel.visible{display:block;}

/* PLATE GROUP */
.plate-group{background:var(--white);margin-bottom:8px;}
.plate-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.plate-header-left{display:flex;align-items:center;gap:8px;}
.plate-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.plate-name{font-size:15px;font-weight:700;}
.add-btn{display:none;font-size:12px;font-weight:600;color:var(--red);border:1.5px dashed var(--red);background:none;padding:4px 12px;border-radius:20px;cursor:pointer;}
body.edit-mode .add-btn{display:block;}
.drag-handle{display:none;font-size:18px;color:var(--sub2);cursor:grab;padding:0 4px;line-height:1;}
body.edit-mode .drag-handle{display:inline;}
.plate-group.drag-over{outline:2px dashed var(--red);outline-offset:-2px;}
.plate-group.dragging{opacity:.4;}

/* MENU ITEM */
.menu-item{display:flex;align-items:center;padding:13px 16px;border-top:1px solid var(--border);gap:12px;cursor:pointer;}
.menu-img{width:80px;height:80px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;}
.menu-img img{width:100%;height:100%;object-fit:cover;}
.menu-img-ph{font-size:26px;opacity:.25;}
.img-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:10px;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;}
.img-overlay span{color:white;font-size:9px;font-weight:600;}
body.edit-mode .menu-img:hover .img-overlay{display:flex;}
.menu-info{flex:1;min-width:0;}
.menu-name{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:2px;}
.menu-sub{font-size:11px;color:var(--sub);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.menu-tags{display:flex;flex-wrap:wrap;gap:3px;}
.m-tag{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--bg);color:var(--sub);border:1px solid var(--border);}
.m-tag.key{background:#FFF3F3;color:var(--red);border-color:#fdd;}
.m-tag.sauce-tag{background:#FFF7ED;color:#C2410C;border-color:#FED7AA;}
.m-tag.garnish-tag{background:#F0FDF4;color:#166534;border-color:#BBF7D0;}
.menu-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.expand-icon{font-size:16px;color:var(--sub2);transition:transform .2s;line-height:1;}
.expand-icon.open{transform:rotate(180deg);}
.item-edit-btns{display:none;flex-direction:column;gap:4px;}
body.edit-mode .item-edit-btns{display:flex;}
.ie-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}

/* DETAIL */
.menu-detail{display:none;background:#fafafa;border-top:1px solid var(--border);padding:14px 16px;}
.menu-detail.open{display:block;}
.d-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.d-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.d-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:white;color:var(--text);font-weight:500;}
.d-chip.key{color:white;border-color:var(--black);background:var(--black);}
.d-steps{list-style:none;display:flex;flex-direction:column;gap:8px;}
.d-step{display:flex;gap:9px;align-items:flex-start;}
.d-num{width:20px;height:20px;border-radius:50%;background:var(--black);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.d-txt{font-size:13px;line-height:1.6;}

/* PLATE COLOR THEMING */
[data-c="blue"]   .d-num{background:var(--blue)}   [data-c="blue"]   .d-chip.key{background:var(--blue);border-color:var(--blue)}
[data-c="green"]  .d-num{background:var(--green)}  [data-c="green"]  .d-chip.key{background:var(--green);border-color:var(--green)}
[data-c="red2"]   .d-num{background:var(--red2)}   [data-c="red2"]   .d-chip.key{background:var(--red2);border-color:var(--red2)}
[data-c="purple"] .d-num{background:var(--purple)} [data-c="purple"] .d-chip.key{background:var(--purple);border-color:var(--purple)}
[data-c="orange"] .d-num{background:var(--orange)} [data-c="orange"] .d-chip.key{background:var(--orange);border-color:var(--orange)}
[data-c="blk"]    .d-num{background:var(--blk)}    [data-c="blk"]    .d-chip.key{background:var(--blk);border-color:var(--blk)}
[data-c="yellow"] .d-num{background:var(--yellow)} [data-c="yellow"] .d-chip.key{background:var(--yellow);border-color:var(--yellow)}
[data-c="none"]   .d-num{background:#999}           [data-c="none"]   .d-chip.key{background:#555;border-color:#555}

/* SEARCH RESULTS */
.sec-label{padding:10px 16px 5px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);background:var(--bg);}
.no-result{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px;}

/* MEMO */
.memo-card{background:var(--white);border-radius:12px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;}
.memo-card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.memo-card-title{font-size:15px;font-weight:700;}
.memo-card-btns{display:none;gap:6px;}
body.edit-mode .memo-card-btns{display:flex;}
.memo-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-top:1px solid var(--border);}
.memo-check{width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0;}
.memo-time{font-size:11px;font-weight:600;color:var(--red);white-space:nowrap;flex-shrink:0;min-width:70px;}
.memo-text{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.memo-long-item{padding:12px 16px;border-top:1px solid var(--border);background:#fafafa;}
.memo-long-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
.memo-long-text.checked{text-decoration:line-through;color:var(--sub2);}
/* 메모 표 */
.memo-table-wrap{overflow-x:auto;padding:0 16px 14px;}
.memo-table{width:100%;border-collapse:collapse;font-size:13px;}
.memo-table th{background:var(--text);color:white;padding:8px 10px;text-align:center;font-weight:600;font-size:12px;white-space:nowrap;}
.memo-table th:first-child{text-align:left;background:#444;}
.memo-table td{padding:7px 10px;border:1px solid var(--border);text-align:center;color:var(--text);}
.memo-table td:first-child{font-weight:600;background:#fafafa;text-align:left;white-space:nowrap;}
.memo-table tr:nth-child(even) td{background:#f9f9f9;}
.memo-table tr:nth-child(even) td:first-child{background:#f3f3f3;}
.memo-table td[contenteditable]{outline:none;cursor:text;}
.memo-table td[contenteditable]:focus{background:#FFF9E6;}

/* 메모 항목 입력 row */
.memo-row{display:flex;gap:6px;align-items:center;}
.memo-row .time-input{width:90px;padding:8px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;text-align:center;}
.memo-row .time-input:focus{border-color:var(--red);}
.memo-row .text-input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.memo-row .text-input:focus{border-color:var(--red);}

.shop-card{background:var(--white);border-radius:12px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;}
.shop-card-top{display:flex;gap:12px;padding:14px 14px 0;}
.shop-card-img{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:24px;}
.shop-card-img img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.shop-card-info{flex:1;min-width:0;}
.shop-card-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:3px;}
.shop-card-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.shop-card-brand{font-size:13px;color:var(--sub);margin-bottom:2px;}
.shop-card-size{font-size:13px;color:var(--sub);}
.shop-card-body{padding:10px 14px 12px;}
.shop-badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.shop-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.shop-badge.where{background:#EEF2FF;color:#4F46E5;}
.shop-badge.alt{background:#FFF7ED;color:#C2410C;}
.shop-memo{font-size:12px;color:var(--sub);line-height:1.5;}
.shop-card-foot{display:none;justify-content:flex-end;gap:6px;padding:0 14px 12px;}
body.edit-mode .shop-card-foot{display:flex;}

/* HALL - FAQ */
.faq-item{background:var(--white);border-radius:12px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;}
.faq-q{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;}
.faq-q-text{flex:1;}
.faq-q-ko{font-size:14px;font-weight:600;line-height:1.4;}
.faq-q-en{font-size:11px;color:var(--sub);margin-top:2px;font-style:italic;}
.faq-arrow{font-size:14px;color:var(--sub2);transition:transform .2s;flex-shrink:0;}
.faq-arrow.open{transform:rotate(180deg);}
.faq-edit-btns{display:none;gap:4px;flex-shrink:0;}
body.edit-mode .faq-edit-btns{display:flex;}
.faq-a{display:none;padding:12px 16px 14px;background:#fafafa;border-top:1px solid var(--border);}
.faq-a.open{display:block;}
.faq-a-ko{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.faq-a-en{font-size:11px;color:var(--sub);line-height:1.6;margin-top:6px;white-space:pre-wrap;font-style:italic;padding-top:6px;border-top:1px solid var(--border);}

.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:none;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.filter-btn.active{background:var(--text);color:white;border-color:var(--text);}
.filter-btn.plate-active{color:white;border-color:transparent;}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#1A1A1A;color:white;font-weight:600;flex-shrink:0;}
.price-tag{font-size:12px;font-weight:700;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:8px;flex-shrink:0;white-space:nowrap;}
.cuts-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#E0F2FE;color:#0369A1;font-weight:700;flex-shrink:0;}
.sauce-chip{background:#FFF7ED !important;color:#C2410C !important;border-color:#FED7AA !important;}
.garnish-chip{background:#F0FDF4 !important;color:#166534 !important;border-color:#BBF7D0 !important;}
.prep-item{padding:14px 16px !important;}

/* 빠른 선택 칩 */
.quick-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;padding:8px 10px;background:#F8F8F8;border-radius:10px;border:1px solid var(--border);min-height:36px;}
.quick-chips:empty{display:none;}
.q-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--text);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
.q-chip:hover{border-color:var(--red);color:var(--red);background:#FFF5F5;}
.q-chip.selected{background:var(--text);color:white;border-color:var(--text);}
.quick-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--sub2);width:100%;margin-bottom:3px;}

.bottom-add{padding:14px 16px;display:none;}
body.edit-mode .bottom-add{display:block;}
.bottom-add-btn{width:100%;padding:12px;border:2px dashed var(--border);border-radius:12px;background:none;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;}
.empty h3{font-size:18px;font-weight:700;margin:14px 0 6px;}
.empty p{font-size:13px;color:var(--sub);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;}
.modal-title{font-size:17px;font-weight:700;}
.modal-x{background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);}
.modal-body{padding:14px 20px 20px;display:flex;flex-direction:column;gap:14px;}
.f-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);margin-bottom:5px;display:block;}
.f-input,.f-select,.f-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:white;outline:none;}
.f-input:focus,.f-textarea:focus{border-color:var(--red);}
.f-select{cursor:pointer;}
.f-textarea{resize:vertical;min-height:70px;line-height:1.6;}
.f-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-group{display:flex;flex-direction:column;}

/* IMG UPLOAD */
.img-upload{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;position:relative;}
.img-upload:hover{border-color:var(--red);}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-upload .up-icon{font-size:26px;margin-bottom:4px;}
.img-upload .up-hint{font-size:12px;color:var(--sub);}
.img-upload .preview{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:8px;display:none;}

/* LIST ROWS */
.list-rows{display:flex;flex-direction:column;gap:6px;}
.list-row{display:flex;gap:6px;align-items:center;}
.list-row input[type=text]{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;}
.list-row input[type=text]:focus{border-color:var(--red);}
.list-row .ck{width:17px;height:17px;accent-color:var(--red);cursor:pointer;flex-shrink:0;}
.rm-btn{background:none;border:none;color:var(--sub2);cursor:pointer;font-size:17px;padding:0 2px;flex-shrink:0;}
.row-handle{color:var(--sub2);cursor:grab;font-size:16px;padding:0 4px;flex-shrink:0;touch-action:none;}
.row-handle:active{cursor:grabbing;}
.list-row.dragging{opacity:.4;}
.list-row.drag-over{border-top:2px solid var(--red);}
.add-row{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;color:var(--sub);font-family:'Noto Sans KR',sans-serif;width:fit-content;}
.add-row:hover{border-color:var(--red);color:var(--red);}

/* MODAL FOOTER */
.modal-foot{padding:0 20px 24px;display:flex;gap:10px;}
.f-cancel{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--sub);font-family:'Noto Sans KR',sans-serif;}
.f-save{flex:2;padding:12px;border:none;border-radius:10px;background:var(--red);color:white;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:white;border-radius:18px;padding:26px 22px;text-align:center;width:100%;max-width:300px;}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:7px;}
.confirm-box p{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:20px;}
.confirm-btns{display:flex;gap:8px;}
.c-no{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.c-yes{flex:1;padding:11px;border:none;border-radius:10px;background:var(--red2);color:white;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}

/* PASSWORD */
.pw-box{background:white;border-radius:18px;padding:28px 22px;text-align:center;width:100%;max-width:300px;}
.pw-box .icon{font-size:32px;margin-bottom:10px;}
.pw-box h3{font-size:17px;font-weight:700;margin-bottom:5px;}
.pw-box p{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.5;}
.pw-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:18px;text-align:center;letter-spacing:6px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:5px;}
.pw-input:focus{border-color:var(--red);}
.pw-err{font-size:12px;color:var(--red2);height:16px;margin-bottom:8px;font-weight:600;}
.pw-btns{display:flex;gap:8px;}
.pw-cancel{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.pw-ok{flex:2;padding:11px;border:none;border-radius:10px;background:var(--red);color:white;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.pw-change{margin-top:12px;font-size:11px;color:var(--sub2);cursor:pointer;text-decoration:underline;display:block;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* PRINT */
@media print{
  body > *{ display:none !important; }
  #printArea{ display:block !important; font-family:sans-serif; color:#111; padding:15px; }
  .pa-title{ text-align:center; font-size:18px; font-weight:700; margin-bottom:3px; }
  .pa-date{ text-align:center; color:#888; font-size:11px; margin-bottom:18px; }
  .pa-sec{ margin-bottom:18px; }
  .pa-sec-title{ font-size:14px; font-weight:700; border-bottom:2px solid #111; padding-bottom:4px; margin-bottom:8px; }
  .pa-plate-title{ font-size:11px; font-weight:700; color:#555; margin:10px 0 4px; padding-bottom:3px; border-bottom:1px solid #eee; }
  .pa-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  .pa-card{ border:1px solid #ddd; border-radius:5px; margin-bottom:6px; break-inside:avoid; overflow:hidden; }
  .pa-card-top{ display:flex; align-items:center; padding:7px 10px; gap:8px; }
  .pa-card-img{ width:48px; height:48px; border-radius:5px; object-fit:cover; flex-shrink:0; }
  .pa-card-noimg{ width:48px; height:48px; border-radius:5px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .pa-name{ font-size:13px; font-weight:700; }
  .pa-sub{ font-size:10px; color:#888; }
  .pa-card-body{ padding:7px 10px; background:#fafafa; border-top:1px solid #eee; }
  .pa-dlabel{ font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#999; margin-bottom:4px; }
  .pa-chips{ display:flex; flex-wrap:wrap; gap:3px; margin-bottom:7px; }
  .pa-chip{ font-size:10px; padding:2px 6px; border-radius:20px; border:1px solid #ddd; background:white; }
  .pa-chip-key{ background:#111; color:white; border-color:#111; }
  .pa-step{ display:flex; gap:6px; margin-bottom:4px; align-items:flex-start; }
  .pa-step-num{ min-width:16px; height:16px; border-radius:50%; background:#555; color:white; font-size:8px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
  .pa-step-txt{ font-size:11px; line-height:1.5; }
}
#printArea{ display:none; }
</style>
</head>
<body>

<!-- PRINT AREA - always in DOM, hidden except @media print -->
<div id="printArea"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="store-name">🍣 Wara Sushi</div>
    <div class="topbar-btns">
      <button class="print-btn" onclick="openPrint()">🖨️</button>
      <button class="print-btn" id="syncBtn" onclick="manualSync()" title="구글 시트 동기화">🔄</button>
      <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">편집</button>
    </div>
  </div>
  <div class="edit-banner">✏️ 편집 모드</div>
</div>

<!-- KITCHEN TABS -->
<div class="kitchen-tabs">
  <button class="k-tab active" id="kt-front" onclick="showKitchen('front',this)">🍣 앞주방</button>
  <button class="k-tab" id="kt-back" onclick="showKitchen('back',this)">🔥 뒷주방</button>
  <button class="k-tab" id="kt-hall" onclick="showKitchen('hall',this)">🏠 홀</button>
  <button class="k-tab" id="kt-search" onclick="showKitchen('search',this)">🔍 검색</button>
</div>

<!-- FRONT KITCHEN -->
<div id="k-front" class="k-panel visible">
  <nav class="sec-nav"><div class="sec-nav-inner">
    <button class="s-tab active" onclick="showSec('front','nigiri1',this)">니기리 1</button>
    <button class="s-tab" onclick="showSec('front','nigiri2',this)">니기리 2</button>
    <button class="s-tab" onclick="showSec('front','roll1',this)">롤 1</button>
    <button class="s-tab" onclick="showSec('front','roll2',this)">롤 2</button>
    <button class="s-tab" onclick="showSec('front','platter',this)">🍱 플래터</button>
    <button class="s-tab" onclick="showSec('front','prep',this)">🥣 프렙</button>
    <button class="s-tab" onclick="showSec('front','memo',this)">📋 메모</button>
  </div></nav>
  <div class="main">
    <div id="front-nigiri1" class="s-panel visible"><div id="fb-front-nigiri1" class="filter-bar"></div><div id="fc-front-nigiri1"></div></div>
    <div id="front-nigiri2" class="s-panel"><div id="fb-front-nigiri2" class="filter-bar"></div><div id="fc-front-nigiri2"></div></div>
    <div id="front-roll1" class="s-panel"><div id="fb-front-roll1" class="filter-bar"></div><div id="fc-front-roll1"></div></div>
    <div id="front-roll2" class="s-panel"><div id="fb-front-roll2" class="filter-bar"></div><div id="fc-front-roll2"></div></div>
    <div id="front-platter" class="s-panel"></div>
    <div id="front-prep" class="s-panel"></div>
    <div id="front-memo" class="s-panel" style="padding:16px;">
      <div id="memo-front"></div>
      <div id="memoAddRow-front" style="margin-top:12px;display:none;">
        <button class="bottom-add-btn" onclick="openMemoAdd('front')">+ 메모 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- BACK KITCHEN -->
<div id="k-back" class="k-panel">
  <nav class="sec-nav"><div class="sec-nav-inner">
    <button class="s-tab active" onclick="showSec('back','sizzling',this)">시즐링</button>
    <button class="s-tab" onclick="showSec('back','hotmeal',this)">핫밀</button>
    <button class="s-tab" onclick="showSec('back','sidedish',this)">사이드디쉬</button>
    <button class="s-tab" onclick="showSec('back','prep',this)">🥣 프렙</button>
    <button class="s-tab" onclick="showSec('back','memo',this)">📋 메모</button>
  </div></nav>
  <div class="main">
    <div id="back-sizzling" class="s-panel visible"></div>
    <div id="back-hotmeal" class="s-panel"></div>
    <div id="back-sidedish" class="s-panel"></div>
    <div id="back-prep" class="s-panel"></div>
    <div id="back-memo" class="s-panel" style="padding:16px;">
      <div id="memo-back"></div>
      <div id="memoAddRow-back" style="margin-top:12px;display:none;">
        <button class="bottom-add-btn" onclick="openMemoAdd('back')">+ 메모 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- HALL PANEL -->
<div id="k-hall" class="k-panel">
  <nav class="sec-nav"><div class="sec-nav-inner">
    <button class="s-tab active" onclick="showSec('hall','shopping',this)">🛒 장보기</button>
    <button class="s-tab" onclick="showSec('hall','faq',this)">❓ 자주하는 질문</button>
    <button class="s-tab" onclick="showSec('hall','memo',this)">📋 메모</button>
  </div></nav>
  <div class="main">
    <div id="hall-shopping" class="s-panel visible">
      <!-- 구매처 필터 -->
      <div id="shopFilterBar" style="padding:8px 12px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:101px;z-index:81;">
      </div>
      <!-- 장보기 검색 -->
      <div style="padding:10px 14px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:141px;z-index:80;">
        <div class="search-inner">
          <span style="font-size:15px;opacity:.4;">🔍</span>
          <input class="search-input" id="shopSearchInput" type="text" placeholder="재료명, 브랜드, 구매처 검색..."
            oninput="doShopSearch(this.value)" autocomplete="off">
          <button id="shopSearchClear" onclick="clearShopSearch()" style="background:none;border:none;font-size:18px;color:var(--sub2);cursor:pointer;display:none;">×</button>
        </div>
      </div>
      <div style="padding:16px;">
        <div id="shoppingContent"></div>
        <div id="shopAddRow" style="margin-top:12px;display:none;">
          <button class="bottom-add-btn" onclick="openShoppingAdd()">+ 장보기 항목 추가</button>
        </div>
      </div>
    </div>
    <div id="hall-faq" class="s-panel" style="padding:16px;">
      <div id="faqContent"></div>
      <div id="faqAddRow" style="margin-top:12px;display:none;">
        <button class="bottom-add-btn" onclick="openFaqAdd()">+ 질문 추가</button>
      </div>
    </div>
    <div id="hall-memo" class="s-panel" style="padding:16px;">
      <div id="memo-hall"></div>
      <div id="memoAddRow-hall" style="margin-top:12px;display:none;">
        <button class="bottom-add-btn" onclick="openMemoAdd('hall')">+ 메모 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- SEARCH PANEL -->
<div id="k-search" class="k-panel">
  <div class="search-wrap" id="searchWrap" style="display:block;position:sticky;top:85px;z-index:89;">
    <div class="search-inner">
      <span style="font-size:15px;opacity:.4;">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="메뉴 이름 또는 재료 검색..."
        oninput="doSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
    </div>
  </div>
  <div class="main" id="searchResults"></div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">레시피 추가</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="f-group" id="imgUploadGroup">
        <label class="f-label">사진</label>
        <div class="img-upload">
          <input type="file" accept="image/*" id="imgFile" onchange="handleImg(event)">
          <div id="imgPh"><div class="up-icon">📷</div><div class="up-hint">사진 업로드</div></div>
          <img id="imgPv" class="preview">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">이름</label>
        <input class="f-input" id="fNameEn" placeholder="예) Salmon Nigiri / 테리야키 소스">
      </div>
      <div class="f-group" id="subGroup">
        <label class="f-label">서브타이틀</label>
        <input class="f-input" id="fNameKr" placeholder="살몬 니기리">
      </div>
      <div class="f-row2" id="plateGroup">
        <div class="f-group">
          <label class="f-label">접시 색깔</label>
          <select class="f-select" id="fPlate" onchange="updatePriceGroup()">
            <option value="blue">🔵 파란색 $5.5</option>
            <option value="green">🟢 녹색 $6.0</option>
            <option value="red2">🔴 빨간색 $6.5</option>
            <option value="purple">🟣 보라색 $7.0</option>
            <option value="orange">🟠 주황색 $8.0</option>
            <option value="blk">⚫ 검은색 $9.0</option>
            <option value="yellow">🟡 노란색 $4.5</option>
            <option value="none">⬜ 접시 없음</option>
          </select>
        </div>
        <div class="f-group">
          <label class="f-label">섹션</label>
          <select class="f-select" id="fSec" onchange="onSecChange()">
            <option value="front-nigiri1">앞주방 니기리1</option>
            <option value="front-nigiri2">앞주방 니기리2</option>
            <option value="front-roll1">앞주방 롤1</option>
            <option value="front-roll2">앞주방 롤2</option>
            <option value="front-platter">앞주방 플래터</option>
            <option value="front-prep">앞주방 프렙</option>
            <option value="back-sizzling">뒷주방 시즐링</option>
            <option value="back-hotmeal">뒷주방 핫밀</option>
            <option value="back-sidedish">뒷주방 사이드디쉬</option>
            <option value="back-prep">뒷주방 프렙</option>
          </select>
        </div>
      </div>
      <!-- 프렙일 때 섹션만 따로 표시 -->
      <div class="f-group" id="prepSecGroup" style="display:none;">
        <label class="f-label">섹션</label>
        <select class="f-select" id="fSecPrep" onchange="document.getElementById('fSec').value=this.value;">
          <option value="front-prep">앞주방 프렙</option>
          <option value="front-platter">앞주방 플래터</option>
          <option value="back-prep">뒷주방 프렙</option>
        </select>
      </div>
      <div class="f-group" id="catGroup" style="display:none;">
        <label class="f-label">카테고리</label>
        <select class="f-select" id="fCat"></select>
      </div>
      <div class="f-group" id="priceGroup" style="display:none;">
        <label class="f-label">가격 (수동 입력)</label>
        <input class="f-input" id="fPrice" type="number" step="0.5" min="0" placeholder="예) 12.5">
      </div>
      <div class="f-group" id="cutsGroup" style="display:none;">
        <label class="f-label">컷 수</label>
        <select class="f-select" id="fCuts">
          <option value="">선택 안 함</option>
          <option value="6">6컷</option>
          <option value="8">8컷</option>
          <option value="4">4컷</option>
          <option value="12">12컷</option>
        </select>
      </div>
      <div class="f-group" id="sauceGroup">
        <label class="f-label">소스</label>
        <div class="quick-chips" id="sauceQuick"></div>
        <div class="list-rows" id="sauceList"></div>
        <button class="add-row" onclick="addSauce()">+ 직접 입력</button>
      </div>
      <div class="f-group" id="ingGroup">
        <label class="f-label">재료 <span style="font-weight:400;text-transform:none;font-size:10px">★체크=주재료</span></label>
        <div class="quick-chips" id="ingQuick"></div>
        <div class="list-rows" id="ingList"></div>
        <button class="add-row" onclick="addIng()">+ 직접 입력</button>
      </div>
      <div class="f-group" id="garnishGroup">
        <label class="f-label">가니쉬</label>
        <div class="quick-chips" id="garnishQuick"></div>
        <div class="list-rows" id="garnishList"></div>
        <button class="add-row" onclick="addGarnish()">+ 직접 입력</button>
      </div>
      <!-- 프렙/플래터 전용: 준비물/구성 -->
      <div class="f-group" id="prepIngGroup" style="display:none;">
        <label class="f-label" id="prepIngLabel">준비물</label>
        <div class="list-rows" id="prepIngList"></div>
        <button class="add-row" id="prepIngAddBtn" onclick="addPrepIng()">+ 준비물 추가</button>
      </div>
      <div class="f-group">
        <label class="f-label">순서</label>
        <div class="list-rows" id="stepList"></div>
        <button class="add-row" onclick="addStep()">+ 단계 추가</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="f-cancel" onclick="closeModal()">취소</button>
      <button class="f-save" onclick="saveRecipe()">저장</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmModal">
  <div class="confirm-box">
    <h3>레시피 삭제</h3>
    <p id="confirmTxt"></p>
    <div class="confirm-btns">
      <button class="c-no" onclick="closeConfirm()">취소</button>
      <button class="c-yes" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="confirm-overlay" id="pwModal">
  <div class="pw-box">
    <div class="icon">🔐</div>
    <h3 id="pwTitle">편집 모드</h3>
    <p id="pwDesc">비밀번호를 입력하세요</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter')doPw()">
    <div class="pw-err" id="pwErr"></div>
    <div class="pw-btns">
      <button class="pw-cancel" onclick="closePw()">취소</button>
      <button class="pw-ok" onclick="doPw()">확인</button>
    </div>
    <span class="pw-change" id="pwChangeLink" onclick="startPwChange()">비밀번호 변경</span>
  </div>
</div>

<!-- SHOPPING MODAL -->
<div class="overlay" id="shoppingModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="shopModalTitle">🛒 장보기 항목 추가</div>
      <button class="modal-x" onclick="closeShoppingModal()">×</button>
    </div>
    <div class="modal-body">
      <!-- 사진 -->
      <div class="f-group">
        <label class="f-label">사진 (패키지)</label>
        <div class="img-upload">
          <input type="file" accept="image/*" id="shopImgFile" onchange="handleShopImg(event)">
          <div id="shopImgPh"><div class="up-icon">📦</div><div class="up-hint">패키지 사진 업로드</div></div>
          <img id="shopImgPv" class="preview">
        </div>
      </div>
      <div class="f-row2">
        <div class="f-group">
          <label class="f-label">카테고리</label>
          <input class="f-input" id="shopCat" placeholder="예) 해산물">
        </div>
        <div class="f-group">
          <label class="f-label">재료명 *</label>
          <input class="f-input" id="shopName" placeholder="예) 살몬">
        </div>
      </div>
      <div class="f-row2">
        <div class="f-group">
          <label class="f-label">브랜드</label>
          <input class="f-input" id="shopBrand" placeholder="예) Tassal">
        </div>
        <div class="f-group">
          <label class="f-label">용량 / 규격</label>
          <input class="f-input" id="shopSize" placeholder="예) 1kg">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">구매처</label>
        <input class="f-input" id="shopWhere" placeholder="예) Costco / IGA">
      </div>
      <div class="f-group">
        <label class="f-label">대체 브랜드 / 대체템</label>
        <input class="f-input" id="shopAlt" placeholder="예) 없으면 Coles 냉장 살몬으로 대체">
      </div>
      <div class="f-group">
        <label class="f-label">메모</label>
        <input class="f-input" id="shopMemo" placeholder="예) 냉동 말고 냉장으로, 매주 월요일 주문">
      </div>
    </div>
    <div class="modal-foot">
      <button class="f-cancel" onclick="closeShoppingModal()">취소</button>
      <button class="f-save" onclick="saveShoppingItem()">저장</button>
    </div>
  </div>
</div>

<!-- FAQ MODAL -->
<div class="overlay" id="faqModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="faqModalTitle">❓ 질문 추가</div>
      <button class="modal-x" onclick="closeFaqModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="f-group">
        <label class="f-label">질문 (한국어)</label>
        <input class="f-input" id="faqQ" placeholder="예) 아보카도 대신 오이 넣을 수 있나요?">
      </div>
      <div class="f-group">

      </div>
      <div class="f-group">
        <label class="f-label">답변 (한국어)</label>
        <textarea class="f-textarea" id="faqA" placeholder="예) 네, 가능합니다. 추가 비용 없이 오이로 대체해 드려요."></textarea>
      </div>
      <div class="f-group">

      </div>
    </div>
    <div class="modal-foot">
      <button class="f-cancel" onclick="closeFaqModal()">취소</button>
      <button class="f-save" onclick="saveFaqItem()">저장</button>
    </div>
  </div>
</div>

<!-- MEMO MODAL -->
<div class="overlay" id="memoModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="memoModalTitle">📋 메모 추가</div>
      <button class="modal-x" onclick="closeMemoModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="f-group">
        <label class="f-label">제목</label>
        <input class="f-input" id="memoTitle" placeholder="예) 오픈 순서, 베이비롤 갯수">
      </div>
      <!-- 일반 항목 영역 -->
      <div id="memoNormalSection" class="f-group">
        <label class="f-label">항목 <span style="font-weight:400;text-transform:none;font-size:10px">시간은 선택사항</span></label>
        <div class="list-rows" id="memoItemList"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="add-row" onclick="addMemoItem()">+ 시간 + 한줄</button>
          <button class="add-row" onclick="addMemoLongItem()">+ 긴 메모</button>
        </div>
      </div>
      <!-- 표 편집 영역 -->
      <div id="memoTableSection" class="f-group" style="display:none;">
        <label class="f-label">첫 번째 열 이름 <span style="font-weight:400;text-transform:none;font-size:10px">예) 베이비롤 갯수</span></label>
        <input class="f-input" id="memoRowHeader" placeholder="베이비롤 갯수" style="margin-bottom:10px;">
        <label class="f-label">열 이름 <span style="font-weight:400;text-transform:none;font-size:10px">예) 1차 / 2차(월-목) / 2차(금-일)</span></label>
        <div class="list-rows" id="memoColList"></div>
        <button class="add-row" onclick="addMemoCol()">+ 열 추가</button>
        <label class="f-label" style="margin-top:12px;">행 이름 <span style="font-weight:400;text-transform:none;font-size:10px">예) 오이 / 단무지 / 튜나</span></label>
        <div class="list-rows" id="memoRowList"></div>
        <button class="add-row" onclick="addMemoRow()">+ 행 추가</button>
      </div>
      <!-- 타입 선택 -->
      <div style="display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">
        <button id="memoTypeNormal" class="filter-btn active" onclick="setMemoType('normal')" style="font-size:12px;">📋 일반</button>
        <button id="memoTypeTable" class="filter-btn" onclick="setMemoType('table')" style="font-size:12px;">📊 표</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="f-cancel" onclick="closeMemoModal()">취소</button>
      <button class="f-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<!-- PRINT MODAL -->
<div class="confirm-overlay" id="printModal">
  <div class="confirm-box" style="max-width:340px;">
    <h3 style="margin-bottom:14px;">🖨️ 프린트</h3>
    <div id="printChkList" style="display:flex;flex-direction:column;gap:8px;text-align:left;margin-bottom:18px;"></div>
    <div class="confirm-btns">
      <button class="c-no" onclick="closePrintModal()">취소</button>
      <button class="c-yes" style="background:var(--red);" onclick="doPrint()">프린트</button>
    </div>
  </div>
</div>

// ── 스토리지 래퍼 (Claude.ai → window.storage, GitHub Pages → localStorage) ──
const storage = {
  get: async function(key) {
    if (window.storage && window.storage !== storage) {
      try { return await window.storage.get(key); } catch(e) {}
    }
    const val = localStorage.getItem(key);
    return val ? { value: val } : null;
  },
  set: async function(key, value) {
    if (window.storage && window.storage !== storage) {
      try { await window.storage.set(key, value); } catch(e) {}
    }
    try { localStorage.setItem(key, value); } catch(e) {}
  }
};

async function loadDB() {
  // 1. 로컬 스토리지에서 먼저 불러와서 빠르게 표시
  try {
    const r = await storage.get('waraDB');
    if (r) DB = JSON.parse(r.value);
    else DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) {
    DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  // 2. 구글 시트에서 최신 데이터 동기화 (백그라운드)
  syncFromSheets();
}

async function manualSync() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳';
  btn.style.pointerEvents = 'none';
  await syncFromSheets();
  btn.textContent = '🔄';
  btn.style.pointerEvents = 'auto';
}

async function syncFromSheets() {
  try {
    const resp = await fetch(SHEETS_URL + '?action=read', {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
    const text = await resp.text();
    const data = JSON.parse(text);
    if (data.error) { console.log('Sheets error:', data.error); return; }

    // localStorage에서 직접 이미지 맵 생성 (가장 안전)
    const imgMap = {};
    try {
      const localRaw = localStorage.getItem('waraDB');
      if (localRaw) {
        const localDB = JSON.parse(localRaw);
        ALL_SECS.forEach(function(sec) {
          (localDB[sec]||[]).forEach(function(r) {
            if (r.id && r.img) imgMap[r.id] = r.img;
          });
        });
      }
    } catch(e) {}

    if (data.recipes && data.recipes.length) {
      const secs = {};
      data.recipes.forEach(function(r) {
        if (!r.section) return;
        if (!secs[r.section]) secs[r.section] = [];
        // 항상 로컬 이미지 우선 적용
        if (imgMap[r.id]) r.img = imgMap[r.id];
        secs[r.section].push(r);
      });
      Object.keys(secs).forEach(function(sec) { DB[sec] = secs[sec]; });
    }
    if (data.prep && data.prep.length) {
      const frontPrep = data.prep.filter(function(r){ return r.section === 'front-prep'; });
      const backPrep  = data.prep.filter(function(r){ return r.section === 'back-prep'; });
      if (frontPrep.length) DB['front-prep'] = frontPrep;
      if (backPrep.length)  DB['back-prep']  = backPrep;
    }
    if (data.shopping) DB.shopping = data.shopping;
    if (data.faq)      DB.faq      = data.faq;
    await storage.set('waraDB', JSON.stringify(DB));
    renderAll();
    showToast('✅ 구글 시트 동기화 완료');
  } catch(e) {
    console.log('Sheets sync failed:', e);
    showToast('⚠️ 동기화 실패');
  }
}

async function saveDB() {
  // 1. 로컬에 즉시 저장
  try { await storage.set('waraDB', JSON.stringify(DB)); } catch(e) {}
  // 2. 구글 시트에 백그라운드 저장
  syncToSheets();
}

async function syncToSheets() {
  try {
    const recipes = [];
    const recipeSecs = ['front-nigiri1','front-nigiri2','front-roll1','front-roll2',
                        'back-sizzling','back-hotmeal','back-sidedish'];
    recipeSecs.forEach(function(sec) {
      (DB[sec]||[]).forEach(function(r) {
        recipes.push(Object.assign({}, r, { section: sec }));
      });
    });
    const prep = [...(DB['front-prep']||[]), ...(DB['back-prep']||[])];
    const payload = JSON.stringify({
      action: 'write',
      data: {
        recipes:  recipes,
        shopping: DB.shopping || [],
        faq:      DB.faq      || [],
        prep:     prep
      }
    });
    // no-cors: 응답을 읽을 수 없지만 쓰기는 됨
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: payload
    });
  } catch(e) {
    console.log('Sheets write failed:', e);
  }
}

  'front-nigiri2': ['Nigiri','Ship'],
  'front-roll1':   ['Special Roll','Big Roll','Maki'],
  'front-roll2':   ['Cream Cheese Roll','Rice Paper','Medium Roll','Baby Roll'],
};

// 현재 필터 상태 {secId: {type:'all'|'plate'|'cat', value:string}}
const FILTERS = {};

function getFilter(secId) {
  return FILTERS[secId] || {type:'all', value:''};
}
function setFilter(secId, type, value) {
  FILTERS[secId] = {type, value};
  renderFilterBar(secId);
  renderSecContent(secId);
}

// ═══════════════ RENDER ═══════════════
function renderAll() {
  ALL_SECS.forEach(s => renderSec(s));
}

function renderSec(secId) {
  // 앞주방 4개 섹션만 필터 바 있음
  const hasFilter = !!SEC_CATS[secId];
  if (hasFilter) {
    renderFilterBar(secId);
    renderSecContent(secId);
  } else {
    // 뒷주방: 기존 방식 그대로
    const el = document.getElementById(secId);
    if (!el) return;
    renderSecInto(el, secId, DB[secId] || []);
  }
}

function renderFilterBar(secId) {
  const fb = document.getElementById('fb-' + secId);
  if (!fb) return;
  const f = getFilter(secId);
  const cats = SEC_CATS[secId] || [];

  // 접시색 버튼들
  const items = DB[secId] || [];
  const usedPlates = [...new Set(items.map(r => r.plate))].filter(p => PLATE[p]);

  let html = '<button class="filter-btn' + (f.type==='all' ? ' active' : '') + '" onclick="setFilter(\'' + secId + '\',\'all\',\'\')">전체</button>';

  // 카테고리 버튼
  if (cats.length) {
    html += '<div class="filter-divider"></div>';
    cats.forEach(function(cat) {
      const isActive = f.type === 'cat' && f.value === cat;
      html += '<button class="filter-btn' + (isActive ? ' active' : '') + '" onclick="setFilter(\'' + secId + '\',\'cat\',\'' + cat + '\')">' + cat + '</button>';
    });
  }

  // 접시색 버튼
  if (usedPlates.length) {
    html += '<div class="filter-divider"></div>';
    usedPlates.forEach(function(pk) {
      const m = PLATE[pk];
      if (!m || pk === 'none') return;
      const isActive = f.type === 'plate' && f.value === pk;
      html += '<button class="filter-btn' + (isActive ? ' plate-active' : '') + '" style="' + (isActive ? 'background:' + m.color + ';' : '') + '" onclick="setFilter(\'' + secId + '\',\'plate\',\'' + pk + '\')">'
        + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + m.color + ';margin-right:5px;vertical-align:middle;"></span>' + m.label.replace(' 접시','')
        + '</button>';
    });
  }

  fb.innerHTML = html;
}

function renderSecContent(secId) {
  const fc = document.getElementById('fc-' + secId);
  if (!fc) return;
  const f = getFilter(secId);
  let items = DB[secId] || [];

  if (f.type === 'cat') {
    items = items.filter(function(r) {
      return CAT_MAP[r.id] === f.value;
    });
  } else if (f.type === 'plate') {
    items = items.filter(function(r) { return r.plate === f.value; });
  }

  renderSecInto(fc, secId, items);
}

function renderSecInto(el, secId, items) {
  const groups = {};
  items.forEach(r => { if (!groups[r.plate]) groups[r.plate] = []; groups[r.plate].push(r); });
  const order = (DB._order && DB._order[secId]) || PLATE_ORDER;
  const active = order.filter(p => groups[p]);

  let html = '';
  if (!active.length) {
    const f = getFilter(secId);
    const msg = f.type !== 'all' ? '해당 필터의 메뉴가 없어요' : '아직 레시피가 없어요';
    html = '<div class="empty"><h3>' + msg + '</h3></div>';
  } else {
    active.forEach(pk => {
      const m = PLATE[pk];
      const isNone = pk === 'none';
      const hdr = isNone
        ? '<div style="display:flex;justify-content:flex-end;padding:10px 14px 2px;"><button class="add-btn" onclick="openAdd(\'' + secId + '\',\'' + pk + '\')">+ 추가</button></div>'
        : '<div class="plate-header"><div class="plate-header-left"><span class="drag-handle" title="드래그">⠿</span><span class="plate-dot" style="background:' + m.color + '"></span><span class="plate-name">' + m.label + '</span></div><button class="add-btn" onclick="openAdd(\'' + secId + '\',\'' + pk + '\')">+ 추가</button></div>';
      html += '<div class="plate-group" data-sec="' + secId + '" data-plate="' + pk + '">' + hdr + groups[pk].map(r => renderItem(r, secId)).join('') + '</div>';
    });
  }
  html += '<div class="bottom-add"><button class="bottom-add-btn" onclick="openAdd(\'' + secId + '\',\'' + (secId.startsWith('back-') ? 'none' : 'blue') + '\')">+ 새 레시피 추가</button></div>';
  el.innerHTML = html;
  el.querySelectorAll('.plate-group').forEach(g => initDrag(g, secId));
}


function renderItem(r, secId) {
  const isPrep = secId === 'front-prep' || secId === 'back-prep' || secId === 'front-platter';
  if (isPrep) return renderPrepItem(r, secId);

  const img = r.img
    ? '<img src="' + r.img + '" style="width:100%;height:100%;object-fit:cover;">'
    : '<div class="menu-img-ph">🍱</div>';
  const tags = r.ingredients.slice(0,3).map(i => '<span class="m-tag' + (i.key ? ' key' : '') + '">' + i.name + '</span>').join('');
  const chips = r.ingredients.map(i => '<span class="d-chip' + (i.key ? ' key' : '') + '">' + i.name + '</span>').join('');
  const steps = r.steps.map((s,i) => '<li class="d-step"><span class="d-num">' + (i+1) + '</span><span class="d-txt">' + s + '</span></li>').join('');
  const safeName = r.nameEn.replace(/'/g, "\\'");
  const cat = CAT_MAP[r.id];
  const catBadge = cat ? '<span class="cat-badge">' + cat + '</span>' : '';

  // 컷 수 뱃지
  const cutsBadge = r.cuts ? '<span class="cuts-badge">' + r.cuts + '컷</span>' : '';
  // 가격
  const platePrice = PLATE[r.plate] && PLATE[r.plate].price;
  const price = platePrice !== null && platePrice !== undefined ? platePrice : (r.price || null);
  const priceTag = price ? '<span class="price-tag">$' + price.toFixed(1) + '</span>' : '';

  // 소스 / 재료 / 가니쉬 상세
  const saucesDetail = (r.sauces && r.sauces.length)
    ? '<div class="d-label">소스</div><div class="d-chips">' + r.sauces.map(s => '<span class="d-chip sauce-chip">' + s + '</span>').join('') + '</div>'
    : '';
  const garnishesDetail = (r.garnishes && r.garnishes.length)
    ? '<div class="d-label" style="margin-top:8px;">가니쉬</div><div class="d-chips">' + r.garnishes.map(g => '<span class="d-chip garnish-chip">' + g + '</span>').join('') + '</div>'
    : '';
  const ingDetail = chips
    ? '<div class="d-label" style="margin-top:' + (saucesDetail ? '8px' : '0') + ';">재료</div><div class="d-chips">' + chips + '</div>'
    : '';

  return '<div class="menu-item" onclick="toggleItem(this)" data-c="' + r.plate + '">'
    + '<div class="menu-img" onclick="if(editMode){event.stopPropagation();document.getElementById(\'fi-' + r.id + '\').click();}">'
    + img
    + '<div class="img-overlay"><span>📷</span><span>변경</span></div>'
    + '<input type="file" accept="image/*" id="fi-' + r.id + '" style="display:none" onchange="handleCardImg(event,\'' + r.id + '\',\'' + secId + '\')">'
    + '</div>'
    + '<div class="menu-info">'
    + '<div class="menu-name">' + r.nameEn + '</div>'
    + '<div class="menu-sub">' + r.nameKr + '</div>'
    + '<div class="menu-tags">' + catBadge + cutsBadge + tags + '</div>'
    + '</div>'
    + '<div class="menu-right">'
    + '<div class="item-edit-btns" onclick="event.stopPropagation()">'
    + '<button class="ie-btn" title="복사" onclick="copyRecipe(\'' + r.id + '\',\'' + secId + '\')">📋</button>'
    + '<button class="ie-btn" onclick="openEdit(\'' + r.id + '\',\'' + secId + '\')">✏️</button>'
    + '<button class="ie-btn" onclick="openConfirm(\'' + r.id + '\',\'' + secId + '\',\'' + safeName + '\')">🗑️</button>'
    + '</div>'
    + priceTag
    + '<div class="expand-icon">⌄</div>'
    + '</div>'
    + '</div>'
    + '<div class="menu-detail" data-c="' + r.plate + '">'
    + saucesDetail
    + ingDetail
    + garnishesDetail
    + '<div class="d-label" style="margin-top:' + (saucesDetail||ingDetail||garnishesDetail ? '8px' : '0') + ';">순서</div><ul class="d-steps">' + steps + '</ul>'
    + '</div>';
}

function renderPrepItem(r, secId) {
  const isPlatter = secId === 'front-platter';
  const safeName = r.nameEn.replace(/'/g, "\\'");
  const prepIngHtml = (r.prepIng && r.prepIng.length)
    ? '<div class="d-label">' + (isPlatter ? '구성' : '준비물') + '</div><div class="d-chips">'
      + r.prepIng.map(s => '<span class="d-chip">' + s + '</span>').join('') + '</div>'
    : '';
  const steps = (r.steps||[]).map((s,i) => '<li class="d-step"><span class="d-num">' + (i+1) + '</span><span class="d-txt">' + s + '</span></li>').join('');

  // 플래터는 사진 표시
  const imgHtml = isPlatter
    ? '<div class="menu-img" onclick="if(editMode){event.stopPropagation();document.getElementById(\'fi-' + r.id + '\').click();}">'
      + (r.img ? '<img src="' + r.img + '" style="width:100%;height:100%;object-fit:cover;">' : '<div class="menu-img-ph">🍱</div>')
      + '<div class="img-overlay"><span>📷</span><span>변경</span></div>'
      + '<input type="file" accept="image/*" id="fi-' + r.id + '" style="display:none" onchange="handleCardImg(event,\'' + r.id + '\',\'' + secId + '\')">'
      + '</div>'
    : '';

  return '<div class="menu-item prep-item" onclick="toggleItem(this)">'
    + imgHtml
    + '<div class="menu-info" style="padding:2px 0;">'
    + '<div class="menu-name">' + r.nameEn + '</div>'
    + '</div>'
    + '<div class="menu-right">'
    + '<div class="item-edit-btns" onclick="event.stopPropagation()">'
    + '<button class="ie-btn" title="복사" onclick="copyRecipe(\'' + r.id + '\',\'' + secId + '\')">📋</button>'
    + '<button class="ie-btn" onclick="openEdit(\'' + r.id + '\',\'' + secId + '\')">✏️</button>'
    + '<button class="ie-btn" onclick="openConfirm(\'' + r.id + '\',\'' + secId + '\',\'' + safeName + '\')">🗑️</button>'
    + '</div>'
    + '<div class="expand-icon">⌄</div>'
    + '</div>'
    + '</div>'
    + '<div class="menu-detail">'
    + prepIngHtml
    + (prepIngHtml ? '<div class="d-label" style="margin-top:10px;">순서</div>' : '<div class="d-label">순서</div>')
    + '<ul class="d-steps">' + steps + '</ul>'
    + '</div>';
}

function toggleItem(row) {
  const detail = row.nextElementSibling;
  if (!detail || !detail.classList.contains('menu-detail')) return;
  const open = detail.classList.toggle('open');
  row.querySelector('.expand-icon').classList.toggle('open', open);
}

// ═══════════════ NAV ═══════════════
function showKitchen(id, btn) {
  document.querySelectorAll('.k-panel').forEach(p => p.classList.remove('visible'));
  document.querySelectorAll('.k-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('k-' + id).classList.add('visible');
  btn.classList.add('active');
  if (id === 'search') {
    setTimeout(function() { document.getElementById('searchInput').focus(); }, 100);
    doSearch(document.getElementById('searchInput').value);
  } else if (id === 'hall') {
    renderHall();
  } else {
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

function showSec(kitchen, sec, btn) {
  const panel = document.getElementById('k-' + kitchen);
  panel.querySelectorAll('.s-panel').forEach(s => s.classList.remove('visible'));
  panel.querySelectorAll('.s-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(kitchen + '-' + sec).classList.add('visible');
  btn.classList.add('active');
  if (kitchen === 'hall') renderHall();
  if (sec === 'memo') renderMemo(kitchen);
}

// ═══════════════ EDIT MODE + PASSWORD ═══════════════
async function hashPW(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function getSavedHash() {
  try { const r = await storage.get('waraHash'); return r ? r.value : DEFAULT_PW; }
  catch(e) { return DEFAULT_PW; }
}
async function saveHash(h) {
  try { await storage.set('waraHash', h); } catch(e) {}
}

function toggleEdit() {
  if (editMode) {
    editMode = false;
    document.body.classList.remove('edit-mode');
    document.getElementById('editToggle').classList.remove('active');
    document.getElementById('editToggle').textContent = '편집';
    renderAll();
    renderHall();
    ['front','back','hall'].forEach(function(z){renderMemo(z);});
  } else {
    pwMode = 'login';
    document.getElementById('pwTitle').textContent = '편집 모드';
    document.getElementById('pwDesc').textContent = '비밀번호를 입력하세요';
    document.getElementById('pwChangeLink').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwErr').textContent = '';
    document.getElementById('pwModal').classList.add('open');
    setTimeout(function() { document.getElementById('pwInput').focus(); }, 100);
  }
}

function closePw() {
  document.getElementById('pwModal').classList.remove('open');
  pwMode = 'login'; pendingNewHash = null;
}

function startPwChange() {
  pwMode = 'change-old';
  document.getElementById('pwTitle').textContent = '비밀번호 변경';
  document.getElementById('pwDesc').textContent = '현재 비밀번호를 입력하세요';
  document.getElementById('pwChangeLink').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
}

async function doPw() {
  const val = document.getElementById('pwInput').value;
  const errEl = document.getElementById('pwErr');
  if (!val) { errEl.textContent = '비밀번호를 입력하세요'; return; }
  const h = await hashPW(val);

  if (pwMode === 'login') {
    if (h === await getSavedHash()) {
      closePw();
      editMode = true;
      document.body.classList.add('edit-mode');
      document.getElementById('editToggle').classList.add('active');
      document.getElementById('editToggle').textContent = '완료';
      renderAll();
      renderHall();
      ['front','back','hall'].forEach(function(z){renderMemo(z);});
    } else {
      errEl.textContent = '비밀번호가 틀렸습니다';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').style.animation = 'shake .3s ease';
      setTimeout(function() { document.getElementById('pwInput').style.animation = ''; }, 300);
    }
  } else if (pwMode === 'change-old') {
    if (h === await getSavedHash()) {
      pwMode = 'change-new';
      document.getElementById('pwDesc').textContent = '새 비밀번호 입력 (4자 이상)';
      document.getElementById('pwInput').value = '';
      errEl.textContent = '';
    } else {
      errEl.textContent = '현재 비밀번호가 틀렸습니다';
      document.getElementById('pwInput').value = '';
    }
  } else if (pwMode === 'change-new') {
    if (val.length < 4) { errEl.textContent = '4자 이상 입력하세요'; return; }
    if (!pendingNewHash) {
      pendingNewHash = h;
      document.getElementById('pwDesc').textContent = '새 비밀번호 확인';
      document.getElementById('pwInput').value = '';
      errEl.textContent = '';
    } else if (h === pendingNewHash) {
      await saveHash(h);
      pendingNewHash = null;
      closePw();
      showToast('✅ 비밀번호 변경 완료');
    } else {
      errEl.textContent = '비밀번호가 일치하지 않습니다';
      pendingNewHash = null;
      document.getElementById('pwInput').value = '';
      document.getElementById('pwDesc').textContent = '새 비밀번호 다시 입력';
    }
  }
}

// ═══════════════ IMAGE ═══════════════
function handleImg(e) {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = function(ev) {
    currentImg = ev.target.result;
    document.getElementById('imgPv').src = currentImg;
    document.getElementById('imgPv').style.display = 'block';
    document.getElementById('imgPh').style.display = 'none';
  };
  rd.readAsDataURL(f);
}
function handleCardImg(e, id, secId) {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = async function(ev) {
    const r = (DB[secId]||[]).find(x => x.id === id);
    if (r) { r.img = ev.target.result; await saveDB(); renderSec(secId); }
  };
  rd.readAsDataURL(f);
}

// ═══════════════ MODAL ═══════════════
function onSecChange() {
  const secId = document.getElementById('fSec').value;
  updateModalForSec(secId);
}

function updateModalForSec(secId) {
  const isPrep    = secId === 'front-prep' || secId === 'back-prep';
  const isPlatter = secId === 'front-platter';
  const isPrepLike = isPrep || isPlatter;

  const ids = ['imgUploadGroup','subGroup','plateGroup','catGroup','priceGroup','cutsGroup','sauceGroup','ingGroup','garnishGroup'];
  ids.forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    if (isPrepLike) {
      // 플래터는 사진만 보여줌, 프렙은 사진도 숨김
      if (id === 'imgUploadGroup') {
        el.style.display = isPlatter ? 'block' : 'none';
      } else {
        el.style.display = 'none';
      }
    } else {
      el.style.display = (id === 'catGroup' || id === 'priceGroup' || id === 'cutsGroup') ? 'none' : 'block';
    }
  });

  document.getElementById('prepIngGroup').style.display = isPrepLike ? 'block' : 'none';
  document.getElementById('prepSecGroup').style.display = isPrepLike ? 'block' : 'none';
  if (isPrepLike) {
    document.getElementById('prepIngLabel').textContent    = isPlatter ? '구성 (메뉴 + 수량)' : '준비물';
    document.getElementById('prepIngAddBtn').textContent   = isPlatter ? '+ 구성 추가' : '+ 준비물 추가';
  }
  if (!isPrepLike) {
    updatePriceGroup();
    updateCatSelect();
  }
}

function updatePriceGroup() {
  const plate = document.getElementById('fPlate').value;
  const grp = document.getElementById('priceGroup');
  grp.style.display = plate === 'none' ? 'block' : 'none';
}

function updateCatSelect() {
  const secId = document.getElementById('fSec').value;
  const cats = SEC_CATS[secId];
  const grp = document.getElementById('catGroup');
  const sel = document.getElementById('fCat');
  if (cats && cats.length) {
    grp.style.display = 'block';
    sel.innerHTML = cats.map(c => '<option value="' + c + '">' + c + '</option>').join('');
  } else {
    grp.style.display = 'none';
  }
  // 컷 수: 롤1, 롤2만 표시
  const cutsGrp = document.getElementById('cutsGroup');
  cutsGrp.style.display = (secId === 'front-roll1' || secId === 'front-roll2') ? 'block' : 'none';
}

function openAdd(secId, plateKey) {
  editingId = null; currentImg = '';
  const isPrep = secId === 'front-prep' || secId === 'back-prep' || secId === 'front-platter';
  document.getElementById('modalTitle').textContent = isPrep ? '프렙 추가' : '레시피 추가';
  document.getElementById('fNameEn').value = '';
  document.getElementById('fNameKr').value = '';
  document.getElementById('fPlate').value = plateKey;
  document.getElementById('fSec').value = secId;
  document.getElementById('imgPv').style.display = 'none';
  document.getElementById('imgPh').style.display = 'block';
  document.getElementById('imgFile').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fCuts').value = '';
  // 프렙 섹션 선택 싱크
  const prepSel = document.getElementById('fSecPrep');
  if (prepSel) prepSel.value = secId;
  updateModalForSec(secId);
  buildSauceList([]);
  buildIngList([{name:'',key:false}]);
  buildGarnishList([]);
  buildPrepIngList([]);
  renderQuickChips('sauce',   'sauceQuick',   'sauceList',   false);
  renderQuickChips('ing',     'ingQuick',     'ingList',     false);
  renderQuickChips('garnish', 'garnishQuick', 'garnishList', false);
  buildStepList(['']);
  document.getElementById('editModal').classList.add('open');
}

function openEdit(id, secId) {
  const r = (DB[secId]||[]).find(x => x.id === id);
  if (!r) return;
  const isPrep = secId === 'front-prep' || secId === 'back-prep' || secId === 'front-platter';
  editingId = id; currentImg = r.img || '';
  document.getElementById('modalTitle').textContent = isPrep ? '프렙 수정' : '레시피 수정';
  document.getElementById('fNameEn').value = r.nameEn;
  document.getElementById('fNameKr').value = r.nameKr || '';
  document.getElementById('fPlate').value = r.plate || 'none';
  document.getElementById('fSec').value = secId;
  const prepSel = document.getElementById('fSecPrep');
  if (prepSel) prepSel.value = secId;
  if (r.img) {
    document.getElementById('imgPv').src = r.img;
    document.getElementById('imgPv').style.display = 'block';
    document.getElementById('imgPh').style.display = 'none';
  } else {
    document.getElementById('imgPv').style.display = 'none';
    document.getElementById('imgPh').style.display = 'block';
  }
  document.getElementById('imgFile').value = '';
  document.getElementById('fPrice').value = r.price || '';
  document.getElementById('fCuts').value = r.cuts || '';
  updateModalForSec(secId);
  if (!isPrep) {
    const existingCat = CAT_MAP[id];
    if (existingCat) { const sel = document.getElementById('fCat'); if (sel) sel.value = existingCat; }
    buildSauceList(r.sauces || []);
    buildIngList(r.ingredients && r.ingredients.length ? r.ingredients : [{name:'',key:false}]);
    buildGarnishList(r.garnishes || []);

async function saveRecipe() {
  const secId = document.getElementById('fSec').value;
  const nameEn = document.getElementById('fNameEn').value.trim();
  if (!nameEn) { alert('이름을 입력하세요'); return; }
  const isPrep = secId === 'front-prep' || secId === 'back-prep' || secId === 'front-platter';
  const steps = Array.from(document.querySelectorAll('#stepList .list-row')).map(row =>
    row.querySelector('input[type=text]').value.trim()).filter(Boolean);

  if (!DB[secId]) DB[secId] = [];

  if (isPrep) {
    const isPlatter = secId === 'front-platter';
    const prepIng = Array.from(document.querySelectorAll('#prepIngList .list-row')).map(row =>
      row.querySelector('input[type=text]').value.trim()).filter(Boolean);
    const img = isPlatter ? currentImg : '';
    const rec = { id: editingId || (secId + '_' + Date.now()), plate: 'none', nameEn, nameKr: '', img, ingredients: [], steps, prepIng, sauces: [] };
    if (editingId) {
      const idx = DB[secId].findIndex(r => r.id === editingId);
      if (idx !== -1) DB[secId][idx] = { ...DB[secId][idx], nameEn, steps, prepIng, img };
    } else {
      DB[secId].push(rec);
    }
  } else {
    const nameKr = document.getElementById('fNameKr').value.trim();
    const plate = document.getElementById('fPlate').value;
    const ings = Array.from(document.querySelectorAll('#ingList .list-row')).map(row => ({
      name: row.querySelector('input[type=text]').value.trim(),
      key: row.querySelector('.ck').checked
    })).filter(i => i.name);
    const catSel = document.getElementById('fCat');
    const selectedCat = catSel && catSel.value ? catSel.value : null;
    const priceVal = document.getElementById('fPrice').value;
    const price = plate === 'none' && priceVal ? parseFloat(priceVal) : null;
    const cutsVal = document.getElementById('fCuts').value;
    const cuts = cutsVal ? parseInt(cutsVal) : null;
    const sauces = Array.from(document.querySelectorAll('#sauceList .list-row')).map(row =>
      row.querySelector('input[type=text]').value.trim()).filter(Boolean);
    const garnishes = Array.from(document.querySelectorAll('#garnishList .list-row')).map(row =>
      row.querySelector('input[type=text]').value.trim()).filter(Boolean);
    if (editingId) {
      const idx = DB[secId].findIndex(r => r.id === editingId);
      if (idx !== -1) DB[secId][idx] = { ...DB[secId][idx], nameEn, nameKr, plate, ingredients: ings, steps, img: currentImg, price, cuts, sauces, garnishes };
      if (selectedCat) CAT_MAP[editingId] = selectedCat;
    } else {
      const newId = secId + '_' + Date.now();
      DB[secId].push({ id: newId, plate, nameEn, nameKr, img: currentImg, ingredients: ings, steps, price, cuts, sauces, garnishes });
      if (selectedCat) CAT_MAP[newId] = selectedCat;
      else if (SEC_CATS[secId] && SEC_CATS[secId].length) CAT_MAP[newId] = SEC_CATS[secId][0];
    }
  }
  await saveDB();
  closeModal();
  renderSec(secId);
}

// ─── 빠른 선택 칩 ───
// DB 전체에서 자주 쓰는 재료/소스 추출
function getFrequentItems(type) {
  const counter = {};
  ALL_SECS.forEach(function(secId) {
    (DB[secId]||[]).forEach(function(r) {
      const arr = type === 'sauce' ? (r.sauces||[])
                : type === 'garnish' ? (r.garnishes||[])
                : (r.ingredients||[]).map(function(i){return i.name;});
      arr.forEach(function(name) {
        if (!name) return;
        counter[name] = (counter[name]||0) + 1;
      });
    });
  });
  // 빈도 높은 순 정렬, 상위 40개
  return Object.entries(counter)
    .sort(function(a,b){return b[1]-a[1];})
    .slice(0, 40)
    .map(function(e){return e[0];});
}

function renderQuickChips(type, containerId, listId, isKey) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const items = getFrequentItems(type);
  if (!items.length) { container.innerHTML = ''; return; }
  const label = type === 'sauce' ? '소스' : type === 'garnish' ? '가니쉬' : '재료';
  container.innerHTML = '<span class="quick-label">자주 쓰는 ' + label + ' (탭해서 추가)</span>'
    + items.map(function(name) {
        return '<span class="q-chip" onclick="quickAdd(\'' + type + '\',\'' + name.replace(/'/g,"\\'") + '\',' + (isKey?'true':'false') + ',\'' + listId + '\')">' + name + '</span>';
      }).join('');
}

function quickAdd(type, name, isKey, listId) {
  const rows = document.querySelectorAll('#' + listId + ' .list-row');
  for (var i=0; i<rows.length; i++) {
    if (rows[i].querySelector('input[type=text]').value === name) return;

  if (type === 'sauce') {
    addSauceRow(name);
  } else if (type === 'garnish') {
    addGarnishRow(name);
  } else {
    addIngRow(name, false);
  }
  event.target.classList.toggle('selected');
}

// ── 리스트 행 드래그 정렬 ──
var dragRow = null;
function initRowDrag(row) {
  var handle = row.querySelector('.row-handle');
  if (!handle) return;
  // Mouse
  handle.addEventListener('mousedown', function() { row.setAttribute('draggable','true'); });
  row.addEventListener('dragend', function() {
    row.removeAttribute('draggable');
    row.classList.remove('dragging');
    row.parentElement && row.parentElement.querySelectorAll('.list-row').forEach(function(r){ r.classList.remove('drag-over'); });
    dragRow = null;
  });
  row.addEventListener('dragstart', function(e) {
    dragRow = row; row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (dragRow && dragRow !== row) row.classList.add('drag-over');
  });
  row.addEventListener('dragleave', function() { row.classList.remove('drag-over'); });
  row.addEventListener('drop', function(e) {
    e.preventDefault(); row.classList.remove('drag-over');
    if (!dragRow || dragRow === row) return;
    var parent = row.parentElement;
    var rows = Array.from(parent.querySelectorAll('.list-row'));
    var si = rows.indexOf(dragRow), ti = rows.indexOf(row);
    if (si < ti) parent.insertBefore(dragRow, row.nextSibling);
    else parent.insertBefore(dragRow, row);
    dragRow = null;
  });
  // Touch (모바일)
  handle.addEventListener('touchstart', function(e) {
    dragRow = row;
    row._touchY = e.touches[0].clientY;
  }, {passive:true});
  handle.addEventListener('touchmove', function(e) {
    if (!dragRow) return;
    e.preventDefault();
    var y = e.touches[0].clientY;
    var parent = row.parentElement;
    var rows = Array.from(parent.querySelectorAll('.list-row'));
    rows.forEach(function(r) {
      var rect = r.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom && r !== dragRow) {
        rows.forEach(function(x){ x.classList.remove('drag-over'); });
        r.classList.add('drag-over');
      }
    });
  }, {passive:false});
  handle.addEventListener('touchend', function() {
    if (!dragRow) return;
    var parent = row.parentElement;
    var target = parent.querySelector('.list-row.drag-over');
    if (target && target !== dragRow) {
      var rows = Array.from(parent.querySelectorAll('.list-row'));
      var si = rows.indexOf(dragRow), ti = rows.indexOf(target);
      if (si < ti) parent.insertBefore(dragRow, target.nextSibling);
      else parent.insertBefore(dragRow, target);
    }
    parent.querySelectorAll('.list-row').forEach(function(r){ r.classList.remove('drag-over'); });
    dragRow = null;
  });
}

function doSearch(q) {
  const wrap = document.getElementById('searchResults');
  const clearBtn = document.getElementById('searchClear');
  q = q.trim();
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) {
    wrap.innerHTML = '<div class="no-result">메뉴 이름, 재료, 소스, 가니쉬를 입력하세요</div>';
    return;
  }
  const lo = q.toLowerCase();
  let total = 0, html = '';
  ALL_SECS.forEach(secId => {
    const found = (DB[secId]||[]).filter(r =>
      (r.nameEn && r.nameEn.toLowerCase().includes(lo)) ||
      (r.nameKr && r.nameKr.toLowerCase().includes(lo)) ||
      (r.ingredients && r.ingredients.some(i => i.name.toLowerCase().includes(lo))) ||
      (r.sauces    && r.sauces.some(s => s.toLowerCase().includes(lo))) ||
      (r.garnishes && r.garnishes.some(g => g.toLowerCase().includes(lo))) ||
      (r.prepIng   && r.prepIng.some(p => p.toLowerCase().includes(lo)))
    );
    if (!found.length) return;
    total += found.length;
    html += '<div class="sec-label">' + SEC_LABEL[secId] + '</div>';
    found.forEach(r => { html += renderItem(r, secId); });
  });
  wrap.innerHTML = total ? html : '<div class="no-result">"' + q + '" 검색 결과가 없어요</div>';
}

var shopWhereFilter = 'all';

function renderShopFilterBar() {
  var bar = document.getElementById('shopFilterBar');
  if (!bar) return;
  var items = DB.shopping || [];
  // 구매처 목록 자동 추출 (중복 제거, 빈 값 제외)
  var places = [];
  items.forEach(function(item) {
    if (!item.where) return;
    // 여러 구매처가 "/" 로 구분된 경우 분리
    item.where.split('/').forEach(function(p) {
      var t = p.trim();
      if (t && !places.includes(t)) places.push(t);
    });
  });

  var html = '<button class="filter-btn' + (shopWhereFilter==='all'?' active':'') + '" onclick="setShopFilter(\'all\')">전체</button>';
  if (places.length) {
    html += '<div class="filter-divider"></div>';
    places.forEach(function(p) {
      var isActive = shopWhereFilter === p;
      html += '<button class="filter-btn' + (isActive?' active':'') + '" onclick="setShopFilter(\'' + p.replace(/'/g,"\\'") + '\')">' + p + '</button>';
    });
  }
  bar.innerHTML = html;
}

function setShopFilter(val) {
  shopWhereFilter = val;
  renderShopFilterBar();
  renderShopping();
}

function renderShopping() {
  renderShopFilterBar();
  var el = document.getElementById('shoppingContent');
  if (!el) return;
  var allItems = DB.shopping || [];

  // 구매처 필터 적용
  var items = shopWhereFilter === 'all' ? allItems : allItems.filter(function(item) {
    if (!item.where) return false;
    return item.where.split('/').some(function(p){ return p.trim() === shopWhereFilter; });
  });

  if (!allItems.length) {
    el.innerHTML = '<div class="empty"><h3>장보기 가이드가 없어요</h3><p>편집 모드에서 추가해보세요</p></div>';
    return;
  }
  if (!items.length) {
    el.innerHTML = '<div class="empty"><h3>' + shopWhereFilter + ' 항목이 없어요</h3></div>';
    return;
  }
  var groups = {}, order = [];
  items.forEach(function(item) {
    var cat = item.cat || '기타';
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push(item);
  });
  var html = '';
  order.forEach(function(cat) {
    groups[cat].forEach(function(item) {
      var imgHtml = item.img
        ? '<div class="shop-card-img"><img src="' + item.img + '"></div>'
        : '<div class="shop-card-img">📦</div>';
      var badges = '';
      if (item.where) badges += '<span class="shop-badge where">📍 ' + item.where + '</span>';
      if (item.alt)   badges += '<span class="shop-badge alt">🔄 ' + item.alt + '</span>';
      html += '<div class="shop-card">'
        + '<div class="shop-card-top">' + imgHtml
        + '<div class="shop-card-info">'
        + '<div class="shop-card-cat">' + (item.cat||'기타') + '</div>'
        + '<div class="shop-card-name">' + item.name + '</div>'
        + (item.brand ? '<div class="shop-card-brand">🏷 ' + item.brand + '</div>' : '')
        + (item.size  ? '<div class="shop-card-size">📏 ' + item.size + '</div>' : '')
        + '</div></div>'
        + ((badges || item.memo) ? '<div class="shop-card-body">'
          + (badges ? '<div class="shop-badge-row">' + badges + '</div>' : '')
          + (item.memo ? '<div class="shop-memo">📝 ' + item.memo + '</div>' : '')
          + '</div>' : '')
        + '<div class="shop-card-foot">'
        + '<button class="ie-btn" onclick="editShopItem(\'' + item.id + '\')">✏️</button>'
        + '<button class="ie-btn" onclick="deleteShopItem(\'' + item.id + '\')">🗑️</button>'
        + '</div></div>';
    });
  });
  el.innerHTML = html;
}

function renderFaq() {
  var el = document.getElementById('faqContent');
  if (!el) return;
  var items = DB.faq || [];
  if (!items.length) {
    el.innerHTML = '<div class="empty"><h3>자주하는 질문이 없어요</h3><p>편집 모드에서 추가해보세요</p></div>';
